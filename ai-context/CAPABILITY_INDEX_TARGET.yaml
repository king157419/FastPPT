version: 2
project: FastPPT
scope: target
read_order:
  - ai-context/PROJECT_TARGET.md
  - ai-context/CAPABILITY_INDEX_TARGET.yaml

capabilities:
  - id: teaching-spec
    title: TeachingSpec 结构化教学规格
    status: in_progress
    summary: 将教师需求编译为统一对象，供检索、生成、revise 共用。
    target_paths:
      - backend/core/teaching_spec.py
      - backend/core/slide_pipeline.py

  - id: evidence-binding
    title: 页面证据绑定
    status: planned
    summary: 让 slide 与 source chunks 形成稳定关联，增强可追溯性与 revise 质量。
    target_paths:
      - backend/core/source_index.py
      - backend/api/generate.py

  - id: lesson-planner
    title: SlidePlan -> SlideDraft 两阶段生成
    status: in_progress
    summary: 先规划课程页面，再逐页写内容，提升结构和密度控制。
    target_paths:
      - backend/core/slide_pipeline.py
      - backend/core/llm.py
      - backend/api/generate.py

  - id: slide-blocks
    title: Slide Blocks 中间层
    status: partial
    summary: 统一前端、预览、导出和 revise 的内容表示。
    target_paths:
      - backend/core/slide_blocks.py
      - backend/core/ppt_gen.py
      - frontend/src/components/SlideRenderer.vue

  - id: revise-patch
    title: revise patch 引擎
    status: in_progress
    summary: 将页级修改从“重新生成”升级为“局部 patch + 保留约束”。
    target_paths:
      - backend/core/slide_pipeline.py
      - backend/api/generate.py

  - id: mode-a-reuse
    title: 旧 PPT / 参考大纲复用
    status: partial
    summary: 复用已有结构、案例和风格，是 FastPPT 差异化核心能力。
    target_paths:
      - backend/core/source_index.py
      - backend/api/generate.py

  - id: course-memory
    title: 课程长期记忆
    status: planned
    summary: 沉淀资料、生成结果和 revise 历史，提升连续备课一致性。
    target_paths:
      - backend/core/compound_knowledge.py
      - docs/product/

