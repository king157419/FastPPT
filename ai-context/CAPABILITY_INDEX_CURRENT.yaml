version: 2
project: FastPPT
scope: current
read_order:
  - ai-context/PROJECT_CURRENT.md
  - ai-context/CAPABILITY_INDEX_CURRENT.yaml

capabilities:
  - id: upload-parse
    title: 上传与文本解析
    status: active
    summary: 上传 PDF/Word/PPT/TXT 并提取文本块，作为检索输入。
    code_paths:
      - backend/api/upload.py
      - backend/core/parser.py
      - backend/core/source_index.py
    cards:
      - ai-context/capabilities/problem-needs.md
    read_when:
      - 改上传流程
      - 排查解析失败

  - id: chat-intake
    title: 对话澄清与意图采集
    status: active
    summary: 通过聊天持续补全生成前必须字段并输出 TeachingSpec 输入。
    code_paths:
      - backend/api/chat.py
      - backend/core/teaching_spec.py
      - frontend/src/components/ChatPanel.vue
    cards:
      - ai-context/capabilities/chat-clarification.md
      - ai-context/capabilities/teaching-spec.md
    read_when:
      - 改聊天流程
      - 改 preflight 字段

  - id: generation-pipeline
    title: TeachingSpec -> SlidePlan -> SlideDraft
    status: active
    summary: 基于 TeachingSpec 构建 SlidePlan，再生成 SlideDraft 与 slides_json。
    code_paths:
      - backend/core/slide_pipeline.py
      - backend/api/generate.py
      - backend/core/llm.py
    cards:
      - ai-context/capabilities/generate-pipeline.md
      - ai-context/capabilities/slide-blocks.md
    read_when:
      - 改生成主链路
      - 改页面结构

  - id: retrieval-evidence
    title: 检索与来源证据
    status: partial
    summary: 结合检索结果给页面附证据，支持可追溯输出。
    code_paths:
      - backend/core/rag.py
      - backend/core/source_index.py
      - backend/api/generate.py
    cards:
      - ai-context/capabilities/rag-evidence.md
    read_when:
      - 改检索质量
      - 改 evidence 结构

  - id: revise-patch
    title: RevisionPatch 修订链路
    status: active
    summary: revise 先产出 patch，再应用 patch，降低整套重生成依赖。
    code_paths:
      - backend/core/slide_pipeline.py
      - backend/api/generate.py
      - backend/core/llm.py
    cards:
      - ai-context/capabilities/revise-loop.md
    read_when:
      - 改页级修改
      - 排查 revise 质量

  - id: export-render
    title: 导出与预览
    status: active
    summary: 导出 PPTX/DOCX 并在前端预览。
    code_paths:
      - backend/core/ppt_gen.py
      - backend/core/doc_gen.py
      - frontend/src/components/PreviewPanel.vue
    cards:
      - ai-context/capabilities/export-pptx.md
      - ai-context/capabilities/export-docx.md
      - ai-context/capabilities/preview-renderer.md
    read_when:
      - 改导出质量
      - 改预览交互

