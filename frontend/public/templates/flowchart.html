<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流程图动画</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft YaHei", sans-serif; background: transparent; overflow: hidden; }
.container { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; padding: 20px; }
.step {
  display: flex; align-items: center; gap: 0;
  opacity: 0; transform: translateX(-20px);
  transition: all 0.5s ease;
  width: 100%; max-width: 500px;
}
.step.visible { opacity: 1; transform: translateX(0); }
.box {
  flex: 1; padding: 10px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; text-align: center;
  color: white; min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.arrow {
  width: 0; height: 0; flex-shrink: 0;
  border-left: 18px solid var(--accent, #3b82f6);
  border-top: 14px solid transparent;
  border-bottom: 14px solid transparent;
  margin: 0 4px;
  opacity: 0; transition: opacity 0.3s ease 0.4s;
}
.step.visible .arrow { opacity: 1; }
.connector {
  width: 2px; height: 20px; margin: 0 auto;
  background: var(--accent, #3b82f6); opacity: 0;
  transition: opacity 0.3s ease;
}
.connector.visible { opacity: 1; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
let _d; try { _d = window.TEMPLATE_DATA || JSON.parse(decodeURIComponent(location.hash.slice(1))); } catch(e) { _d = null; }
const data = _d || {
  accent: '#3b82f6',
  steps: ['输入数据', '预处理', '模型推断', '后处理', '输出结果'],
  colors: ['#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899']
};
const app = document.getElementById('app');
const accent = data.accent || '#3b82f6';
document.documentElement.style.setProperty('--accent', accent);

data.steps.forEach((step, i) => {
  if (i > 0) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    conn.id = `conn_${i}`;
    app.appendChild(conn);
  }
  const row = document.createElement('div');
  row.className = 'step';
  row.id = `step_${i}`;
  const box = document.createElement('div');
  box.className = 'box';
  box.style.background = (data.colors && data.colors[i]) || accent;
  box.textContent = step;
  row.appendChild(box);
  app.appendChild(row);
});

function animate() {
  data.steps.forEach((_, i) => {
    setTimeout(() => {
      document.getElementById(`step_${i}`)?.classList.add('visible');
      if (i > 0) document.getElementById(`conn_${i}`)?.classList.add('visible');
    }, i * 600);
  });
}
animate();
setInterval(() => {
  document.querySelectorAll('.step, .connector').forEach(el => el.classList.remove('visible'));
  setTimeout(animate, 400);
}, data.steps.length * 600 + 2000);
</script>
</body>
</html>
