<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>时间轴</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft YaHei", sans-serif; background: transparent; overflow: hidden; }
.container { width: 100%; height: 100vh; display: flex; flex-direction: column; padding: 14px 20px 10px; gap: 6px; overflow: hidden; }
.chart-title { font-size: 13px; font-weight: 700; color: #1e293b; text-align: center; flex-shrink: 0; }
.timeline { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; padding: 0 0 0 52px; gap: 0; }
.axis {
  position: absolute; left: 52px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, transparent, var(--accent) 8%, var(--accent) 92%, transparent);
}
.event {
  display: flex; align-items: flex-start; gap: 14px; position: relative;
  opacity: 0; transform: translateX(-16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  padding: 5px 0;
}
.event.visible { opacity: 1; transform: translateX(0); }
.node {
  flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); border: 3px solid white;
  box-shadow: 0 0 0 2px var(--accent);
  position: absolute; left: -6px; top: 5px;
  transition: transform 0.3s ease;
}
.event.visible .node { transform: scale(1); }
.event:not(.visible) .node { transform: scale(0); }
.year-label {
  position: absolute; left: -52px; top: 4px;
  font-size: 10px; font-weight: 700; color: var(--accent);
  font-family: monospace; letter-spacing: 0.05em;
  text-align: right; width: 40px;
}
.card {
  background: white; border-radius: 8px;
  padding: 7px 11px; margin-left: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  border-left: 3px solid var(--accent);
  flex: 1;
}
.card-title { font-size: 11.5px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.card-desc { font-size: 10px; color: #64748b; margin-top: 2px; line-height: 1.4; }
</style>
</head>
<body>
<div class="container">
  <div class="chart-title" id="tl-title"></div>
  <div class="timeline" id="timeline"><div class="axis"></div></div>
</div>
<script>
let d;
try { d = window.TEMPLATE_DATA || JSON.parse(decodeURIComponent(location.hash.slice(1))); } catch(e) { d = null; }
const data = d || {
  title: '人工智能发展历程',
  accent: '#6366f1',
  events: [
    { year: '1956', title: '达特茅斯会议', desc: 'AI 作为学科正式诞生' },
    { year: '1997', title: '深蓝战胜卡斯帕罗夫', desc: '首次 AI 在国际象棋中击败世界冠军' },
    { year: '2012', title: 'AlexNet 突破', desc: '深度学习在 ImageNet 竞赛中大幅领先' },
    { year: '2017', title: 'Transformer 诞生', desc: '谷歌发布《Attention Is All You Need》' },
    { year: '2022', title: 'ChatGPT 发布', desc: '大语言模型进入大众视野' },
  ]
};
const accent = data.accent || '#6366f1';
document.documentElement.style.setProperty('--accent', accent);
document.getElementById('tl-title').textContent = data.title || '';
const container = document.getElementById('timeline');

(data.events || []).forEach((ev, i) => {
  const el = document.createElement('div');
  el.className = 'event';
  el.innerHTML = `
    <span class="year-label">${ev.year || ''}</span>
    <div class="node"></div>
    <div class="card">
      <div class="card-title">${ev.title}</div>
      ${ev.desc ? `<div class="card-desc">${ev.desc}</div>` : ''}
    </div>`;
  container.appendChild(el);
});

function animateIn() {
  const events = document.querySelectorAll('.event');
  events.forEach(e => e.classList.remove('visible'));
  events.forEach((e, i) => setTimeout(() => e.classList.add('visible'), 200 + i * 300));
}
animatateIn = animateIn; // keep reference
animatateIn();

const total = (data.events || []).length;
setInterval(() => {
  document.querySelectorAll('.event').forEach(e => e.classList.remove('visible'));
  setTimeout(animateIn, 400);
}, total * 300 + 2800);
</script>
</body>
</html>
