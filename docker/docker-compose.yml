version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fastppt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fastppt}
      POSTGRES_USER: ${POSTGRES_USER:-fastppt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fastppt_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fastppt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastppt-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fastppt-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastppt-network
    restart: unless-stopped

  # FastAPI Backend
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: fastppt-backend
    environment:
      # API Keys
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-fastppt}:${POSTGRES_PASSWORD:-fastppt_password}@postgres:5432/${POSTGRES_DB:-fastppt}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      RAG_CACHE_TTL: ${RAG_CACHE_TTL:-3600}

      # RAGFlow (Optional)
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-}
      RAGFLOW_KB_ID: ${RAGFLOW_KB_ID:-}

      # PPTXGenJS Service
      PPTXGENJS_SERVICE_URL: http://pptxgenjs:3000

      # Application
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}

      # Monitoring
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      METRICS_PORT: ${METRICS_PORT:-9090}
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/outputs:/app/outputs
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "${METRICS_PORT:-9090}:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fastppt-network
    restart: unless-stopped

  # Node.js PPTXGenJS Service
  pptxgenjs:
    build:
      context: ../
      dockerfile: docker/Dockerfile.pptxgenjs
    container_name: fastppt-pptxgenjs
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - pptxgenjs_temp:/app/temp
      - pptxgenjs_logs:/app/logs
    ports:
      - "${PPTXGENJS_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fastppt-network
    restart: unless-stopped

networks:
  fastppt-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  pptxgenjs_temp:
    driver: local
  pptxgenjs_logs:
    driver: local
